<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Drinkit Design Memes' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Drinkit Design Memes.' }}" />
    <meta property="og:image" content="/assets/IMG_7135.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="shortcut icon" href="/assets/favicon.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body class="ids">
    <header class="site-header">
      <a class="site-header__brand" href="/">
        <img
          class="site-header__logo"
          src="/assets/logo.png"
          alt=""
          width="40"
          height="40" />
        <span class="site-header__title">Drinkit Design Memes</span>
      </a>
    </header>
    {% block content %}{% endblock %}

    <script src="/ids/js/lib/photoswipe.umd.min.js"></script>
    <script src="/ids/js/lib/photoswipe-lightbox.umd.min.js"></script>
    <script src="/ids/js/gallery.js"></script>
    <script src="/assets/script.js" defer></script>
    <script src="/index.js" type="module"></script>
  </body>
</html>
